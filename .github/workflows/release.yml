name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract release version from commit message
        id: version
        shell: pwsh
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          $subject = (($env:COMMIT_MESSAGE -split "`r?`n") | Select-Object -First 1).Trim()
          if ($subject -notmatch '^v(?<version>\d+\.\d+\.\d+)-prod\b') {
            Write-Host "Commit subject does not start with vX.Y.Z-prod; skipping release. Subject: $subject"
            "release=false" >> $env:GITHUB_OUTPUT
            exit 0
          }

          $version = $Matches.version
          Write-Host "Release version: $version"
          "release=true" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$version" >> $env:GITHUB_OUTPUT
          "asset=webwallpaper-$version.exe" >> $env:GITHUB_OUTPUT

      - name: Set up Go
        if: steps.version.outputs.release == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.1"

      - name: Download dependencies
        if: steps.version.outputs.release == 'true'
        run: go mod download

      - name: Test
        if: steps.version.outputs.release == 'true'
        run: go test ./...

      - name: Build binary
        if: steps.version.outputs.release == 'true'
        shell: pwsh
        run: go build -ldflags="-s -w -H windowsgui" -trimpath -o "${{ steps.version.outputs.asset }}" .

      - name: Create and push release tag
        if: steps.version.outputs.release == 'true'
        shell: pwsh
        env:
          TAG_NAME: ${{ steps.version.outputs.tag }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git fetch --tags
          $existing = git rev-list -n 1 "refs/tags/$env:TAG_NAME" 2>$null
          if ($LASTEXITCODE -eq 0) {
            if ($existing -ne $env:GITHUB_SHA) {
              throw "Tag $env:TAG_NAME already exists at $existing, current commit is $env:GITHUB_SHA"
            }
            Write-Host "Tag $env:TAG_NAME already points to this commit"
            exit 0
          }

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$env:TAG_NAME" "$env:GITHUB_SHA"

          if ($env:GH_PAT) {
            git remote set-url origin "https://x-access-token:$env:GH_PAT@github.com/${{ github.repository }}.git"
          }
          git push origin "$env:TAG_NAME"

      - name: Create GitHub Release
        if: steps.version.outputs.release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: Release ${{ steps.version.outputs.version }}
          files: ./${{ steps.version.outputs.asset }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || github.token }}
